apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: debating-backend-pod-kill
  namespace: {{ .Release.Namespace }}
spec:
  action: pod-kill
  mode: fixed
  value: "1"
  duration: "10s"
  selector:
    namespaces:
      - {{ .Release.Namespace }}
    labelSelectors:
      'app': 'backend'
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: debating-backend-pod-kill-cronjob
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "*/5 * * * *" # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: backend-chaos-sa
          restartPolicy: OnFailure
          containers:
          - name: kubectl-helper
            image: bitnami/kubectl:latest
            command:
            - /bin/sh
            - -c
            - "kubectl apply -f /manifests/podchaos.yaml"
            volumeMounts:
            - name: manifest
              mountPath: /manifests
          volumes:
          - name: manifest
            configMap:
              name: debating-backend-pod-kill-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debating-backend-pod-kill-config
  namespace: {{ .Release.Namespace }}
data:
  podchaos.yaml: |
    apiVersion: chaos-mesh.org/v1alpha1
    kind: PodChaos
    metadata:
      name: debating-backend-pod-kill
      namespace: {{ .Release.Namespace }}
    spec:
      action: pod-kill
      mode: fixed
      value: "1"
      selector:
        namespaces:
          - {{ .Release.Namespace }}
        labelSelectors:
          'app': 'backend'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-chaos-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-chaos-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: ["chaos-mesh.org"]
  resources: ["podchaos"]
  verbs: ["get", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-chaos-rb
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: backend-chaos-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: backend-chaos-role
  apiGroup: rbac.authorization.k8s.io
