apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: debating-ingress
  annotations:
    # This tells the NGINX Ingress Controller to use this rule
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: debating.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
